<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body class="page">

<h1>Enjoyed the virtual exploration of Nepal???</h1>

<form id="nepalForm"onsubmit="return validateForm()">

    <!-- NAME -->
    <label>Enter your Name:</label>
    <input type="text" id="name" placeholder="Your full name">

    <!-- EMAIL -->
    <label>Enter your Email:</label>
    <input type="text" id="email" placeholder="example@gmail.com">

    <!-- CONTACT -->
    <label>Contact Number (optional):</label>
    <input type="text" placeholder="Your phone number">

    <!-- EXPERIENCE -->
    <label>How did you feel about Nepal after this virtual tour?</label>
    <textarea placeholder="Share your experience..."></textarea>

    <!-- QUERY -->
    <label>Any queries? (travel cost, hotels, booking etc.)</label>
    <textarea placeholder="Write your questions here..."></textarea>

    <button type="submit">Submit</button>

</form>
    <button class="home-btn" onclick="ganesh()"> back to home</button>
</body>
</html>
