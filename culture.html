<h1>Culture of Nepal</h1>

<div class="grid">

<div class="item">
<img src="images/festival.jpg" onclick="showText('Nepal is a country rich in culture, and festivals are an important part of people’s daily lives. Festivals like Dashain and Tihar are celebrated with great joy, where families come together, share food, and receive blessings. Holi brings fun and colors to the streets, while Buddha Jayanti is observed peacefully to honor Lord Buddha. These festivals show the unity and traditions of the Nepali people.')">
<p>Festivals</p>
</div>

<div class="item">
<img src="images/religion.jpg" onclick="showText('Religion in Nepal is an important part of everyday life, with most people following Hinduism. Buddhism also has a strong presence, as Nepal is the birthplace of Siddhartha Gautama (the Buddha). Alongside these, smaller communities practice Islam, Christianity, and traditional indigenous beliefs, reflecting the country’s cultural diversity.')">
<p>Religion</p>
</div>

<div class="item">
<img src="images/clothing.jpg" onclick="showText('Traditional clothing in Nepal reflects the country’s rich cultural diversity and varies by region and community. Men often wear the daura suruwal with a topi, while women commonly wear a sari or traditional dress like gunyo cholo. These outfits are not only worn daily in some areas but are also important during festivals and special occasions.')">
<p>Clothing</p>
</div>

<div class="item">
<img src="images/music.jpg" onclick="showText('Music and dance in Nepal are vibrant parts of cultural life, reflecting the country’s ethnic diversity and traditions. Folk music is popular, often performed with instruments like the madal and sarangi, and is closely tied to festivals and daily life. Traditional dances such as the Lakhey dance and Maruni dance are performed during celebrations and tell stories of history, religion, and community values.')">
<p>Music & Dance</p>
</div>

<div class="item">
<img src="images/diversity.jpg" onclick="showText('Nepal has many ethnic groups.')">
<p>Diversity</p>
</div>

</div>
