<h1>Foods of Nepal</h1>

<div class="grid">

    <div class="item">
        <img src="images/dalbhat.jpg" onclick="showText('Dal Bhat (Lentil Soup and Rice): Often considered the national dish of Nepal, this daily staple includes steamed rice, lentil soup (dal), vegetable curry (tarkari), and spicy pickle (achaar).')">
        <p>Dal Bhat</p>
    </div>

    <div class="item">
        <img src="images/momo.jpg" onclick="showText('Momo (Dumplings): A highly popular dish, these soft dumplings are filled with minced meat (such as chicken, buffalo, or goat) or vegetables and are usually served with a spicy tomato-based dipping sauce.')">
        <p>Momo</p>
    </div>

    <div class="item">
        <img src="images/dhido.jpg" onclick="showText('Dhido (Flour Pudding): A traditional meal from rural areas, made by mixing hot water with flour like millet, corn, or buckwheat until thick, and commonly eaten with curry or fermented greens (gundruk).')">
        <p>Dhido</p>
    </div>

    <div class="item">
        <img src="images/samaybaji.jpg" onclick="showText('Samay Baji (Newari Platter): A traditional festive meal of the Newari community, consisting of flattened rice, grilled meat (choila), spices, and fermented foods like gundruk.')">
        <p>Samay Baji</p>
    </div>

    <div class="item">
        <img src="images/selroti.jpg" onclick="showText('Sel Roti (Fried Ring Bread): A sweet, crispy, deep-fried bread made from rice flour, traditionally prepared during festivals such as Tihar and Dashain.')">
        <p>Sel Roti</p>
    </div>

</div>
