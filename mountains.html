<h1>Mountains of Nepal</h1>

<div class="item">

<p>Everest</p>
</div>

<div class="item">
<img src="images/kanchanjunga.jpg" onclick="showText('Kanchenjunga : The world’s third-highest mountain (8,586 m), located on the Nepal–India border, famous for its five peaks and considered sacred by local communities.')">
<p>Kanchanjunga</p>
</div>

<div class="item">
<img src="images/lhotse.jpg" onclick="showText('Lhotse : The fourth-highest mountain (8,516 m), connected to Everest via the South Col, and known for having one of the steepest faces in the world.')">
<p>Lhotse</p>
</div>

<div class="item">
<img src="images/makalu.jpg" onclick="showText('Makalu : The fifth-highest peak (8,485 m), notable for its perfect pyramid shape and remote location, making it one of the more difficult mountains to climb.')">
<p>Makalu</p>
</div>

<div class="item">
<img src="images/chooyu.jpg" onclick="showText('Cho Oyu : The sixth-highest mountain (8,188 m), located on the Nepal–Tibet border, and widely regarded as one of the easiest 8,000-meter peaks, often used by climbers as preparation for Everest.')">
<p>Cho Oyu</p>
</div>

</div>
